services:
  - type: web
    name: enterprise-rag-backend
    runtime: python39
    buildCommand: pip install -r requirements.txt
    startCommand: python flask_api.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: ENVIRONMENT
        value: production
      - key: GROQ_API_KEY
        fromSecret: GROQ_API_KEY

secrets:
  - name: GROQ_API_KEY
    description: "Your Groq API Key for LLM functionality"
